<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Auto Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsOTP/2.0.1/jsOTP.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: #ffffff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        
        /* মুছুন বাটন সবার উপরে */
        .clear-btn { background-color: #ff4d4d; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; margin-bottom: 20px; transition: 0.3s; }
        .clear-btn:hover { background-color: #e60000; }

        /* ইনপুট বক্স */
        .input-box { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s; margin-bottom: 20px; text-align: center; }
        .input-box:focus { border-color: #007bff; }

        /* রেজাল্ট বক্স যেখানে কোড দেখাবে */
        .result-box { display: none; background: #f1f3f5; border-radius: 12px; padding: 20px; align-items: center; justify-content: space-between; border: 1px dashed #007bff; margin-top: 10px; }
        .result-box.active { display: flex; }
        
        #otpCode { font-size: 35px; font-weight: 800; color: #333; letter-spacing: 5px; cursor: pointer; }
        
        .copy-icon-btn { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .copy-icon-btn:hover { background: #0056b3; }

        .status-msg { height: 25px; margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <button class="clear-btn" onclick="clearAll()">🗑️ মুছুন</button>

    <input type="text" id="secretInput" class="input-box" placeholder="আপনার 2FA Secret Key এখানে দিন" oninput="process2FA()">

    <div id="resultArea" class="result-box">
        <div id="otpCode" onclick="copyToClipboard()" title="কপি করতে ক্লিক করুন">000000</div>
        <button class="copy-icon-btn" onclick="copyToClipboard()">Copy</button>
    </div>

    <p id="message" class="status-msg"></p>
</div>

<script>
    function process2FA() {
        let secret = document.getElementById('secretInput').value.trim();
        // স্পেস রিমুভ করা (আপনার স্ক্রিনশটের সমস্যার সমাধান)
        secret = secret.replace(/\s+/g, '');
        
        const resultArea = document.getElementById('resultArea');
        const otpDisplay = document.getElementById('otpCode');
        const message = document.getElementById('message');

        if (secret.length >= 10) {
            try {
                var totp = new jsOTP.totp();
                var code = totp.getOtp(secret);
                
                if (code && code !== "NaN") {
                    otpDisplay.innerText = code;
                    resultArea.classList.add('active');
                    
                    // অটোমেটিক কপি করা
                    navigator.clipboard.writeText(code).then(() => {
                        message.style.color = "#28a745";
                        message.innerText = "✅ কোড তৈরি ও কপি হয়েছে!";
                    });
                } else {
                    throw "Invalid";
                }
            } catch (e) {
                message.style.color = "#dc3545";
                message.innerText = "❌ ভুল সিক্রেট কি!";
                resultArea.classList.remove('active');
            }
        } else {
            resultArea.classList.remove('active');
            message.innerText = "";
        }
    }

    // ম্যানুয়াল কপি ফাংশন
    function copyToClipboard() {
        const code = document.getElementById('otpCode').innerText;
        navigator.clipboard.writeText(code);
        const message = document.getElementById('message');
        message.style.color = "#007bff";
        message.innerText = "📋 ক্লিপবোর্ডে কপি করা হয়েছে!";
        setTimeout(() => { message.innerText = ""; }, 2000);
    }

    // সব মুছে ফেলার ফাংশন
    function clearAll() {
        document.getElementById('secretInput').value = "";
        document.getElementById('resultArea').classList.remove('active');
        document.getElementById('message').innerText = "মুছে ফেলা হয়েছে";
        setTimeout(() => { document.getElementById('message').innerText = ""; }, 2000);
    }
</script>

</body>
</html>
