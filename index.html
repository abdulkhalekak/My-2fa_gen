<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto 2FA Gen & Copy</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsOTP/2.0.1/jsOTP.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; margin-top: 50px; background-color: #f4f7f6; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        
        .clear-btn { background-color: #ff4757; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 20px; }
        
        .input-box { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        
        .result-container { position: relative; display: flex; align-items: center; background: #e9ecef; border-radius: 8px; padding: 10px; visibility: hidden; }
        .result-container.show { visibility: visible; }
        
        #resultCode { font-size: 24px; font-weight: bold; letter-spacing: 5px; color: #2f3542; flex-grow: 1; }
        
        .copy-icon { cursor: pointer; font-size: 20px; color: #1e90ff; padding-left: 10px; }
        
        .status { font-size: 12px; color: #2ed573; margin-top: 8px; font-weight: bold; height: 15px; }
    </style>
</head>
<body>

<div class="container">
    <button class="clear-btn" onclick="resetAll()">🗑️ মুছুন</button>

    <input type="text" id="secretInput" class="input-box" placeholder="এখানে Secret Key পেস্ট করুন..." oninput="generateAndCopy()">

    <div id="resWrap" class="result-container">
        <span id="resultCode">------</span>
        <span class="copy-icon" onclick="manualCopy()" title="ম্যানুয়াল কপি">📋</span>
    </div>

    <p id="status" class="status"></p>
</div>

<script>
    function generateAndCopy() {
        const secret = document.getElementById('secretInput').value.trim().replace(/\s/g, "");
        const resWrap = document.getElementById('resWrap');
        const resultCode = document.getElementById('resultCode');
        const status = document.getElementById('status');

        if (secret.length >= 16) { // সাধারণত সিক্রেট কি ১৬ অক্ষরের বেশি হয়
            try {
                // TOTP জেনারেট করা
                var totp = new jsOTP.totp();
                var code = totp.getOtp(secret);
                
                resultCode.innerText = code;
                resWrap.classList.add('show');

                // অটোমেটিক কপি করা
                navigator.clipboard.writeText(code).then(() => {
                    status.innerText = "✅ কোড তৈরি এবং অটো-কপি হয়েছে!";
                    setTimeout(() => { status.innerText = ""; }, 2000);
                });
            } catch (err) {
                status.innerText = "❌ ভুল সিক্রেট কি!";
                resWrap.classList.remove('show');
            }
        } else {
            resWrap.classList.remove('show');
            status.innerText = "";
        }
    }

    function manualCopy() {
        const code = document.getElementById('resultCode').innerText;
        navigator.clipboard.writeText(code);
        document.getElementById('status').innerText = "✅ কপি হয়েছে!";
        setTimeout(() => { document.getElementById('status').innerText = ""; }, 2000);
    }

    function resetAll() {
        document.getElementById('secretInput').value = "";
        document.getElementById('resultCode').innerText = "------";
        document.getElementById('resWrap').classList.remove('show');
        document.getElementById('status').innerText = "সব মুছে ফেলা হয়েছে";
        setTimeout(() => { document.getElementById('status').innerText = ""; }, 2000);
    }
</script>

</body>
</html>
